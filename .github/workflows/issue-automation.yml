name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Run issue triage script
        uses: actions/github-script@v6
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const issueTitle = context.payload.issue.title.toLowerCase();
            const issueBody = context.payload.issue.body?.toLowerCase() || '';

            // Function to create label if it doesn't exist
            async function createLabelIfNotExists(labelName, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: labelName
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: labelName,
                    color: color,
                    description: description
                  });
                } else {
                  throw error;
                }
              }
            }

            // Create required labels
            // Category labels
            await createLabelIfNotExists('bug', 'd73a4a', 'Something isn\'t working');
            await createLabelIfNotExists('enhancement', 'a2eeef', 'New feature or request');
            await createLabelIfNotExists('epic', '0052cc', 'Large feature requiring multiple sub-tasks');
            await createLabelIfNotExists('maintenance', 'fef2c0', 'Maintenance and housekeeping tasks');

            // Priority labels
            await createLabelIfNotExists('priority-critical', 'b60205', 'Critical priority issue');
            await createLabelIfNotExists('priority-high', 'd93f0b', 'High priority issue');
            await createLabelIfNotExists('priority-medium', 'fbca04', 'Medium priority issue');
            await createLabelIfNotExists('priority-low', '0e8a16', 'Low priority issue');

            // Status labels
            await createLabelIfNotExists('needs-triage', 'ffffff', 'Needs to be reviewed by maintainers');
            await createLabelIfNotExists('needs-review', 'd4c5f9', 'Awaiting review from maintainers');
            await createLabelIfNotExists('first-time-contributor', '1d76db', 'Issue created by first-time contributor');

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });

            // Add category label based on title
            const categoryLabels = [];
            if (issueTitle.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (issueTitle.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (issueTitle.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: categoryLabels
              });
            }

            // Add priority label based on title/body (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' } // default if no others
            ];

            let priorityLabel = 'priority-medium'; // default
            for (const { keywords, label } of priorityKeywords) {
              const hasKeyword = keywords.some(k => issueTitle.includes(k) || issueBody.includes(k));
              if (hasKeyword) {
                priorityLabel = label;
                break;
              }
            }

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v6
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const parentTitle = context.payload.issue.title;
            const parentNumber = issue.number;

            // Subtask details
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            const subtaskNumbers = [];

            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${subtasks[i].name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const subtask = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(subtask.data.number);
            }

            // Update parent issue with epic tasks checklist
            const parentBody = context.payload.issue.body || '';
            const epicTasksSection = `\n\n## Epic Tasks\n` +
              subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');

            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: parentNumber,
              body: parentBody + epicTasksSection
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: always()
    steps:
      - name: Run auto-response script
        uses: actions/github-script@v6
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const issueAuthor = context.payload.issue.user.login;
            const issueLabels = context.payload.issue.labels.map(l => l.name);

            // Check if this is the author's first issue in the repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: issueAuthor,
              state: 'all'
            });

            const isFirstIssue = authorIssues.data.length === 1;

            // Add first-time-contributor label if first issue
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });

              // Post welcome message
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: `Welcome @${issueAuthor}! This is your first issue in this repository. We appreciate your contribution and will review your issue shortly.`
              });
            }

            // Post response based on issue type
            let responseBody = '';
            if (issueLabels.includes('bug')) {
              responseBody = `Thank you for reporting this bug! Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure all necessary information is provided. We will investigate this issue as soon as possible.`;
            } else if (issueLabels.includes('epic')) {
              responseBody = `Thank you for submitting this epic feature request! Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle large features. We will break this down into subtasks and review them shortly.`;
            } else if (issueLabels.includes('maintenance')) {
              responseBody = `Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details on how we handle maintenance tasks. We will review this task shortly.`;
            }

            if (responseBody) {
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: responseBody
              });
            }

            // Set milestone for high/critical priority issues
            if (issueLabels.includes('priority-high') || issueLabels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists
              let milestoneId;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: issue.owner,
                  repo: issue.repo,
                  state: 'all'
                });
                const milestone = milestones.data.find(m => m.title === 'v1.0.0');
                if (milestone) {
                  milestoneId = milestone.number;
                } else {
                  // Create milestone if not exists
                  const newMilestone = await github.rest.issues.createMilestone({
                    owner: issue.owner,
                    repo: issue.repo,
                    title: 'v1.0.0',
                    description: 'Milestone for version 1.0.0'
                  });
                  milestoneId = newMilestone.data.number;
                }
              } catch (error) {
                console.error('Error handling milestone:', error);
                throw error;
              }

              // Set milestone on issue
              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                milestone: milestoneId
              });
            }

            // Update status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });