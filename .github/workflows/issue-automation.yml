name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const github = context.getOctokit(process.env.GITHUB_TOKEN);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-triage']
            });

            // Determine category labels based on title
            const title = issue.title.toLowerCase();
            const categoryLabels = [];
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: categoryLabels
              });
            }

            // Determine priority labels based on title or body
            const content = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            let priorityLabel = 'priority-medium'; // default

            const priorityRules = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            for (const rule of priorityRules) {
              if (rule.keywords.some(k => content.includes(k))) {
                priorityLabel = rule.label;
                break; // Highest priority wins
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const github = context.getOctokit(process.env.GITHUB_TOKEN);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Subtask configuration
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create subtasks and collect their numbers
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const task = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const { data: subtask } = await github.rest.issues.create({
                owner,
                repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(subtask.number);
            }

            // Update parent issue with epic tasks checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const updatedBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process auto-response and status
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context;
            const github = context.getOctokit(process.env.GITHUB_TOKEN);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;

            // Check if this is the author's first issue in the repo
            const { data: userIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              creator: author,
              state: 'all'
            });
            const isFirstIssue = userIssues.length === 1;

            // Add first-time-contributor label if applicable
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }

            // Determine response content based on issue type
            const labelNames = issue.labels.map(l => l.name.toLowerCase());
            let response = '';

            if (labelNames.includes('bug')) {
              response = 'Thank you for reporting this bug! Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure all necessary information is provided.';
            } else if (labelNames.includes('epic')) {
              response = 'Thank you for submitting this epic! Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle feature requests.';
            } else if (labelNames.includes('maintenance')) {
              response = 'Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details on our maintenance process.';
            }

            // Add welcome message for first-time contributors
            if (isFirstIssue && response) {
              response = `Welcome to the repository, @${author}! This is your first issue here. ${response}`;
            }

            // Post response comment if content exists
            if (response) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: response
              });
            }

            // Set milestone for high/critical priority issues
            if (labelNames.includes('priority-high') || labelNames.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists, create if not
              let milestoneNumber;
              try {
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100
                });
                const milestone = milestones.find(m => m.title === 'v1.0.0');
                if (milestone) {
                  milestoneNumber = milestone.number;
                } else {
                  const { data: newMilestone } = await github.rest.issues.createMilestone({
                    owner,
                    repo,
                    title: 'v1.0.0'
                  });
                  milestoneNumber = newMilestone.number;
                }
              } catch (e) {
                // Fallback to creating milestone if list fails
                const { data: newMilestone } = await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: 'v1.0.0'
                });
                milestoneNumber = newMilestone.number;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                milestone: milestoneNumber
              });
            }

            // Update status: remove needs-triage, add needs-review
            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: issueNumber,
              name: 'needs-triage'
            });
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });